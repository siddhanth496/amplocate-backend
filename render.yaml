services:
  - type: web
    name: amplocate-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: amplocate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEV_MODE
        value: "true"
      - key: SEED_ON_START
        value: "true"
      - key: IMPORT_NCR_ON_START
        value: "true"

databases:
  - name: amplocate-db
    plan: free
